services:
  mongodb:
    image: mongo:latest
    container_name: finnhub_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
  redis:
    image: redis:alpine
    container_name: finnhub_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: finnhub_backend
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017/finnhub_alerts?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379

volumes:
  mongo_data:
